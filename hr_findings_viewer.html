    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Segoe UI, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: #0c0f13;
    }
    h1 { margin: 0 0 6px; font-size: 22px; }
    .sub { color: var(--muted); font-size: 14px; }
    .layout {
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr);
      min-height: calc(100vh - 82px);
    }
    aside {
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow: auto;
    }
    main {
      padding: 18px;
      overflow: auto;
    }
    input, select, textarea, button {
      font: inherit;
    }
    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 10px;
    }
    .card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .card.active {
      border-color: var(--accent);
      background: var(--panel2);
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .model { font-weight: 700; }
    .task { margin-top: 6px; color: var(--muted); font-size: 13px; }
    .rating {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border);
      text-transform: uppercase;
    }
    .rating.strong { color: var(--good); border-color: rgba(74, 222, 128, .35); }
    .rating.medium { color: var(--warn); border-color: rgba(250, 204, 21, .35); }
    .rating.weak, .rating.dangerous { color: var(--bad); border-color: rgba(251, 113, 133, .35); }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .tag {
      color: var(--accent);
      background: rgba(125, 211, 252, .08);
      border: 1px solid rgba(125, 211, 252, .18);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      cursor: pointer;
    }
    .tag:hover { background: rgba(125, 211, 252, .16); }
    .detail {
      max-width: 980px;
      margin: 0 auto;
    }
    .detail h2 { margin: 0 0 8px; }
    .meta {
      color: var(--muted);
      margin-bottom: 18px;
    }
    .section {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .section h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--accent);
    }
    ul { margin: 0; padding-left: 20px; }
    li { margin: 5px 0; }
    .score {
      font-size: 34px;
      font-weight: 800;
      color: var(--accent);
    }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 50px;
    }
    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    button {
      border: 1px solid var(--border);
      background: var(--panel2);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      background: #0c0f13;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--border); max-height: 45vh; }
    }
  </style>
</head>

      "lesson": "Record project-specific strengths separately from generalized stack strengths and generalized coding strengths so future model choice can transfer to other repositories without overfitting to one codebase.",
      "appliesTo": [
        "all model evaluations"
      ]
    },
    {
      "id": "prompt-style-records",
      "lesson": "Record promptStyle, taskType, promptStrictness, contextProvided, allowedWriteScopeStyle, evaluationMeaning, and promptAdaptationNotes so future model comparisons account for prompt shape.",
      "appliesTo": [
        "all model evaluations"
      ]
    },
    {
      "id": "compatibility-alias-slices",
      "lesson": "For preferred-new-field plus legacy-alias changes, specify preferred-only, legacy-only, and both-present behavior. Require a direct behavior test when cheap; source guards are acceptable only when they match repo guard style.",
      "appliesTo": [
        "Kimi K2.6",
        "Qwen 3.6 Plus",
        "future compatibility-alias workers"
      ]
    },
    {
      "id": "read-only-label-audits",
      "lesson": "Read-only label audits are useful scout tasks for untested models, but prompts must explicitly include placeholders, conditional labels, empty states, subtitles, and error text; Codex should verify a sample before turning findings into implementation tickets.",
      "appliesTo": [
        "DeepSeek V4 Flash",
        "future read-only scout workers"
      ]
    },
    {
      "id": "scout-audit-to-bounded-ticket",
      "lesson": "A read-only scout audit can find useful label/profile hotspots, but Codex should verify and refine the target list before giving a strict bounded implementation ticket to a proven worker.",
      "appliesTo": [
        "DeepSeek V4 Flash",
        "Kimi K2.6",
        "future scout-to-implementation workflows"
      ]
    },
    {
      "id": "handoff-verification-docs",
      "lesson": "When handoff docs are in scope, prompts should explicitly require updating both the implemented-so-far bullets and the latest verification/next-step sections; otherwise strong workers may leave stale verification text.",
      "appliesTo": [
        "Kimi K2.6",
        "future documentation-in-scope implementation tickets"
      ]
    },
    {
      "id": "profile-label-placement-guidance",
      "lesson": "For profile-label wiring slices, prompts should say whether labels belong in DomainLabels or a feature sub-profile; otherwise workers may choose a pragmatic flat placement that is correct for the slice but may grow awkward later.",
      "appliesTo": [
        "Kimi K2.6",
        "future profile-label wiring workers"
      ]
    },
    {
      "id": "dynamic-label-scope",
      "lesson": "For UI label cleanup, explicitly state whether dynamic count/pluralization strings are in scope. Leaving them out can keep a profile-label slice behavior-preserving and easier to review.",
      "appliesTo": [
        "Kimi K2.6",
        "future profile-label wiring workers"
      ]
    },
    {
      "id": "exact-rg-patterns",
      "lesson": "Required rg checks should use exact old strings from the UI, not approximate paraphrases; otherwise a worker can report zero hits while missing coverage of the actual old string.",
      "appliesTo": [
        "Kimi K2.6",
        "future terminology/profile-label workers"
      ]
    },
    {
      "id": "dynamic-rendered-output-examples",
      "lesson": "For dynamic/pluralized UI label changes, require rendered examples for singular and plural cases; profile value tests alone may miss capitalization or grammar regressions.",
      "appliesTo": [
        "Kimi K2.6",
        "future dynamic label workers"
      ]
    },
    {
      "id": "composition-priority-tests",
      "lesson": "For composition helpers with priority classes, require tests that prove the priority rule independent of raw input order, not only same-order overlay application.",
      "appliesTo": [
        "Qwen 3.6 Plus",
        "future profile/core composition workers"
      ]
    },
    {
      "id": "nested-partial-override-tests",
      "lesson": "For nested partial override APIs, require both type support and runtime tests for nested fields; shallow Partial types may pass simple tests while rejecting intended callers.",
      "appliesTo": [
        "Qwen 3.6 Plus",
        "future TypeScript config/profile workers"
      ]
    },
    {
      "id": "deep-clone-immutability",
      "lesson": "For pure merge helpers, no-input-mutation snapshot tests are not enough; require checks or review for cloned nested maps, arrays, and option objects so output does not share mutable internals with inputs.",
      "appliesTo": [
        "Qwen 3.6 Plus",
        "future composition-helper workers"
      ]
    },
    {
      "id": "pi-cli-json-mode-windows",
      "lesson": "For Codex-run Pi HR on Windows, use high thinking, JSON mode, a quoted comma-separated tools allowlist, and pass prompt text from Get-Content -Raw into -p. Do not score low-thinking syntax probes or ambiguous @file attachment runs.",
      "appliesTo": [
        "all Pi CLI worker evaluations"
      ]
    },
    {
      "id": "doc-anchor-guard-restraint",
      "lesson": "For durable-doc guard tests, guard section identity and a few core anchors rather than every sentence. Over-anchoring documentation creates noisy tests and reviewer cleanup.",
      "appliesTo": [
        "Mimo v2.5 Pro",
        "future architecture/doc guard workers"
      ]
    },
    {
      "id": "pause-after-score-seven-or-below",
      "lesson": "Any real worker result scored 7/10 or below must pause the batch before another edit-capable slice starts. Codex should review what went wrong, classify whether it was model behavior, prompt design, task choice, or reviewer cleanup, update HR/prompt rules, and only then continue.",
      "appliesTo": [
        "all Pi CLI worker evaluations",
        "multi-slice HR batches"
      ]
    },
    "For Codex/Claude-orchestrated Pi runs on Windows, set PI_PERMISSION_LEVEL=high in the launching shell. Lower levels (minimal/low) silently block edit/bash tool calls so the worker plans the change but never writes; the slice will appear to complete with exit code 0 yet produce no diff.",
    "When a prompt asserts an absolute before/after test count, prefer \"add exactly N new tests; baseline is approximately M\" framing so the worker is not pulled toward an inaccurate absolute number.",
    "On Windows PowerShell 5.1, do NOT pipe Pi --mode json output through Tee-Object. PS 5.1 wraps native-exe stdout in a way that can deadlock; instead invoke Pi from Git Bash and redirect with `> file 2>&1`, or rely on Pi --session-dir for the audit trail.",
    {
      "id": "2026-05-06-pi-quiet-hours-noninteractive-worker-handling",
      "date": "2026-05-06",
      "lesson": "Keep full npm:mitsupi installed for Pi, but disable only Mitsupi's extensions/go-to-bed.ts from the package manifest. If a package update restores the quiet-hours blocker and it blocks a non-interactive HR worker after the human explicitly asked to continue, disable only that extension again or use --no-extensions as a temporary fallback while keeping PI_PERMISSION_LEVEL=high, --thinking high, --mode json, and the normal tool allowlist. Do not score the initial refusal as a model-quality failure.",
      "appliesTo": [
        "pi-cli",
        "hr-workflow",
        "non-interactive-runs"
      ],
      "sourceEvaluationIds": [
        "2026-05-06-batch3-kimi-k2-6-corrections-composed-profile"
      ]
    },
    {
      "id": "2026-05-06-new-file-workers-use-edit-tool",
      "date": "2026-05-06",
      "lesson": "For Pi worker slices that create new files, explicitly require use of the edit tool rather than shell redirection/cat-style file creation. The latter can still produce correct files, but it is less auditable and less aligned with reviewer expectations.",
      "appliesTo": [
        "pi-cli",
        "prompting",
        "new-file-slices"
      ],
      "sourceEvaluationIds": [
        "2026-05-06-batch4-qwen-3-6-plus-active-profile-source"
      ]
    },
    {
      "id": "2026-05-06-review-unused-imports-even-after-clean-tsc",
      "date": "2026-05-06",
      "lesson": "For TypeScript helper/refactor slices, Codex should review touched imports for unused values even when tsc passes. Some repo settings may not fail on cleanup-level unused imports, but they still reduce acceptance quality.",
      "appliesTo": [
        "typescript",
        "review",
        "bounded-refactor"
      ],
      "sourceEvaluationIds": [
        "2026-05-06-batch4-qwen-3-6-plus-active-profile-source"
      ]
    }
  ],
  "promptStyleTaxonomy": {
    "strict bounded ticket": "Exact context files, explicit write scope, compatibility boundaries, verification commands, rg/search requirements, and final report format.",
    "test-only guard": "Production code is out of scope; worker adds regression or architecture guards for a known failure mode.",
    "architecture/doc guard": "Documentation and source-level architecture guard hardening after implementation slices.",
    "loose exploratory": "Read-only or planning-oriented investigation with more autonomy; avoid for destructive or persistence work.",
    "read-only audit": "No writes allowed; worker inventories source files, classifies findings, and recommends bounded follow-up tickets."
  },
  "promptAdaptationRules": [
    "Record promptStyle, taskType, promptStrictness, contextProvided, allowedWriteScopeStyle, evaluationMeaning, and promptAdaptationNotes for new evaluations.",
    "Use strict bounded tickets for implementation work by cheap/open-weight workers until a model proves broader autonomous planning.",
    "For compatibility aliases, require preferred-only, legacy-only, and both-present behavior to be specified and tested or guarded.",
    "For persistence-adjacent work, require raw boundary-shape tests and validate-before-wipe behavior, or keep the worker draft-only.",
    "For read-only label audits, include placeholders, conditional labels, empty states, subtitles, and error text in the required search target list.",
    "For composition helpers with priority rules, require reversed/input-order tests that prove the priority policy, such as personal overlays winning even when listed before project overlays.",
    "For nested partial override APIs, require TypeScript-safe nested partial examples plus runtime tests for nested fields.",
    "For pure merge helpers, require nested deep-clone/no-shared-reference checks, not only input snapshot equality.",
    "For Codex-run Pi HR on Windows, use --thinking high, --mode json, quoted --tools, and prompt text from Get-Content -Raw; do not score low-thinking syntax probes.",
    "For doc-anchor guard tasks, cap the expected number of tests and anchors, and guard durable section identity rather than every exact wording detail.",
    "If a real worker result scores 7/10 or below, pause the batch, write a failure review, update HR/prompt rules, and only then continue with more edit-capable slices."
  ]
}
  </script>
  <script>
    const db = JSON.parse(document.getElementById('hr-data').textContent);
    const cards = document.getElementById('cards');
    const detail = document.getElementById('detail');
    const search = document.getElementById('search');
    const rating = document.getElementById('rating');
    let selectedId = db.evaluations[0]?.id || null;

    function textOf(ev) {
      return [
        ev.model, ev.runner, ev.task, ev.slice, ev.difficulty, ev.rating, ev.outcome,
        ev.promptStyle, ev.taskType, ev.promptStrictness, ev.evaluationMeaning,
        ...(ev.strengths || []), ...(ev.projectSpecificStrengths || []), ...(ev.generalizedStackStrengths || []), ...(ev.generalizedCodingStrengths || []), ...(ev.misses || []), ...(ev.reviewerFixes || []),
        ...(ev.recommendedUse || []), ...(ev.avoidFor || []), ...(ev.promptImprovements || []),
        ...(ev.contextProvided || []), ...(ev.promptAdaptationNotes || []),
        ...(ev.tags || []), ...(ev.projectTags || []), ...(ev.stackTags || []), ...(ev.generalCodingTags || []), ...(ev.riskTags || [])
      ].join(' ').toLowerCase();
    }

    function filtered() {
      const q = search.value.trim().toLowerCase();
      return db.evaluations.filter(ev => {
        if (rating.value && ev.rating !== rating.value) return false;
        return !q || textOf(ev).includes(q);
      });
    }

    function list(items) {
      return '<ul>' + (items || []).map(item => '<li>' + escapeHtml(item) + '</li>').join('') + '</ul>';
    }

    function tagList(items) {
      return '<div class="tags">' + (items || []).map(tag => `<span class="tag" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</span>`).join('') + '</div>';
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderCards() {
      const rows = filtered();
      cards.innerHTML = rows.map(ev => `
        <div class="card ${ev.id === selectedId ? 'active' : ''}" data-id="${escapeHtml(ev.id)}">
          <div class="row">
            <div class="model">${escapeHtml(ev.model)}</div>
            <div class="rating ${escapeHtml(ev.rating)}">${escapeHtml(ev.rating)} ${escapeHtml(ev.score)}/10</div>
          </div>
          <div class="task">${escapeHtml(ev.task)}</div>
          <div class="tags">${[...(ev.generalCodingTags || []), ...(ev.stackTags || [])].slice(0, 8).map(tag => `<span class="tag" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</span>`).join('')}</div>
        </div>
      `).join('') || '<div class="empty">No matching evaluations.</div>';

      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          selectedId = card.dataset.id;
          render();
        });
      });
      document.querySelectorAll('[data-tag]').forEach(tag => {
        tag.addEventListener('click', (event) => {
          event.stopPropagation();
          search.value = tag.dataset.tag || '';
          render();
        });
      });

      if (rows.length && !rows.some(ev => ev.id === selectedId)) selectedId = rows[0].id;
    }

    function renderDetail() {
      const ev = db.evaluations.find(item => item.id === selectedId);
      if (!ev) {
        detail.innerHTML = '<div class="empty">Select an evaluation.</div>';
        return;
      }
      detail.innerHTML = `
        <h2>${escapeHtml(ev.model)} - ${escapeHtml(ev.task)}</h2>
        <div class="meta">${escapeHtml(ev.date)} · worker: ${escapeHtml(ev.runner)} · reviewer: ${escapeHtml(ev.reviewerModel || 'unknown')} · ${escapeHtml(ev.difficulty)}</div>
        <div class="section">
          <div class="row">
            <div>
              <h3>Outcome</h3>
              <div>${escapeHtml(ev.outcome)}</div>
            </div>
            <div class="score">${escapeHtml(ev.score)}/10</div>
          </div>
        </div>
        <div class="section"><h3>Slice</h3><div>${escapeHtml(ev.slice)}</div></div>
        <div class="section"><h3>Prompt Style</h3><div>${escapeHtml(ev.promptStyle || 'not recorded')} | ${escapeHtml(ev.taskType || 'task type not recorded')} | strictness: ${escapeHtml(ev.promptStrictness || 'not recorded')}</div><div>${escapeHtml(ev.evaluationMeaning || '')}</div></div>
        <div class="section"><h3>Context Provided</h3>${list(ev.contextProvided)}</div>
        <div class="section"><h3>Prompt Adaptation Notes</h3>${list(ev.promptAdaptationNotes)}</div>
        <div class="section"><h3>Strengths</h3>${list(ev.strengths)}</div>
        <div class="section"><h3>Project-Specific Strengths</h3>${list(ev.projectSpecificStrengths)}</div>
        <div class="section"><h3>Generalized Stack Strengths</h3>${list(ev.generalizedStackStrengths)}</div>
        <div class="section"><h3>Generalized Coding Strengths</h3>${list(ev.generalizedCodingStrengths)}</div>
        <div class="section"><h3>Project Tags</h3>${tagList(ev.projectTags)}</div>
        <div class="section"><h3>Stack Tags</h3>${tagList(ev.stackTags)}</div>
        <div class="section"><h3>General Coding Tags</h3>${tagList(ev.generalCodingTags)}</div>
        <div class="section"><h3>Risk Tags</h3>${tagList(ev.riskTags)}</div>
        <div class="section"><h3>Misses</h3>${list(ev.misses)}</div>
        <div class="section"><h3>Reviewer Fixes</h3>${list(ev.reviewerFixes)}</div>
        <div class="section"><h3>Verification</h3>${list(ev.verification)}</div>
        <div class="section"><h3>Recommended Use</h3>${list(ev.recommendedUse)}</div>
        <div class="section"><h3>Avoid For</h3>${list(ev.avoidFor)}</div>
        <div class="section"><h3>Prompt Improvements</h3>${list(ev.promptImprovements)}</div>
        <div class="section"><h3>Useful Tools</h3>${list(ev.usefulTools)}</div>
        <div class="section"><h3>LLM Search Blob</h3><textarea readonly>${escapeHtml(JSON.stringify(ev, null, 2))}</textarea></div>
      `;
      document.querySelectorAll('[data-tag]').forEach(tag => {
        tag.addEventListener('click', () => {
          search.value = tag.dataset.tag || '';
          render();
        });
      });
    }

    function render() {
      renderCards();
      renderDetail();
    }

    search.addEventListener('input', render);
    rating.addEventListener('change', render);
    render();
  </script>
</body>
</html>
